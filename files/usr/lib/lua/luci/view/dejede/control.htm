<%+header%>

<style>
html, body {
    min-height: 100%;
    margin: 0;
    background: #0f111a;
    overflow-x: hidden;
}

/* ❌ JANGAN SENTUH .main */
/* hanya isi content */
#maincontent {
    min-height: calc(100vh - 60px);
    background: #0f111a;
}

/* biar bawah tidak bolong */
.container {
    padding-bottom: 20px;
}
/* smooth scroll tetap aman */
body {
    color: #e6e6e6;
    font-family: Segoe UI, Roboto, sans-serif;
    -webkit-overflow-scrolling: touch;
}
h2 {
    color: #3daee9;
    font-weight: 600;
    margin-bottom: 12px;
    text-align: center;
    letter-spacing: 1px;
}

.card {
    background: #1e2030;
    border-radius: 12px;
    padding: 14px;
    margin: 12px 0;
    border: 1px solid #2a2d3e;
}

.title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 10px;
    color: #9aa0b5;
}

/* ✅ UPGRADE: horizontal layout */
.status-row {
    display: flex;
    gap: 10px;
}

/* BASE BOX */
.status-box {
    flex: 1;
    min-width: 120px;

    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;

    border-radius: 12px;
    padding: 12px;

    color: #fff;
    text-align: center;

    /* ✨ depth + modern look */
    box-shadow: 
        inset 0 0 8px rgba(255,255,255,0.05),
        0 4px 12px rgba(0,0,0,0.4);

    /* ✨ smooth feel */
    transition: 0.2s ease;
}

/* 🎨 WARNA PER BOX */
.status-box:nth-child(1) {
    background: linear-gradient(135deg, #6fbfa8, #4b8f7c);
    box-shadow: 0 0 10px rgba(111,191,168,0.4);
}

.status-box:nth-child(2) {
    background: linear-gradient(135deg, #5fa8d3, #3c7ea3);
    box-shadow: 0 0 10px rgba(95,168,211,0.4);
}

.status-box:nth-child(3) {
    background: linear-gradient(135deg, #d9a86c, #a87b3f);
    box-shadow: 0 0 10px rgba(217,168,108,0.4);
}

.status-box:nth-child(4) {
    background: linear-gradient(135deg, #d96c6c, #a84a4a);
    box-shadow: 0 0 10px rgba(217,108,108,0.4);
}

/* LABEL */
.label {
    font-size: 11px;
    margin-bottom: 2px;
    letter-spacing: 0.5px;
    background: none !important;
    padding: 0;
    border: none;
    color: rgba(255,255,255,0.6);
}

/* VALUE (DESKTOP) */
.value {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
}

/* 📱 MOBILE OPTIMIZATION */
@media (max-width: 600px){

    .status-row {
        flex-direction: column;
        gap: 8px;
    }

    .status-box {
        padding: 12px;
    }

    .label {
        font-size: 10px;
    }

    .value {
        font-size: 18px; /* tetap besar, jangan kecil */
    }
}

/* progress */
.progress {
    height: 5px;
    background: #1e2030;
    border-radius: 3px;
    margin-top: 5px;
}

.bar {
    height: 100%;
    width: 0%;
    background: #3daee9;
}

/* grid & button tetap */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

.btn {
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: bold;
    color: white;
    cursor: pointer;
}

.green { background: #2ecc71; }
.red { background: #e74c3c; }
.blue { background: #3498db; }
.orange { background: #f39c12; }
.gray { background: #2a2d3e; }

#maincontent {
    padding-bottom: 10px;
}

.footer {
    text-align: center;
    font-size: 12px;
    color: #9aa0b5;
    margin-top: 10px;
    opacity: 0.7;
}

</style>

<h2>Dejede Control Panel</h2>

<div class="card">
    <div class="title">System Status</div>

    <!-- 🔥 HORIZONTAL STATUS -->
    <div class="status-row">

        <div class="status-box">
            <div class="label">UPTIME</div>
            <div id="uptime" class="value">--</div>
        </div>

        <div class="status-box">
            <div class="label">CPU</div>
            <div id="cpu" class="value">--</div>
            <div class="progress">
                <div id="cpu_bar" class="bar"></div>
            </div>
        </div>

        <div class="status-box">
            <div class="label">MEMORY</div>
            <div id="mem" class="value">--</div>
            <div class="progress">
                <div id="mem_bar" class="bar"></div>
            </div>
        </div>

        <div class="status-box">
            <div class="label">TEMP</div>
            <div id="temp" class="value">--</div>
        </div>

    </div>
</div>

<div class="card">
    <div class="title">LED Control</div>

    <div class="grid">
        <button class="btn green" onclick="go('led_on')">ON</button>
        <button class="btn red" onclick="go('led_off')">OFF</button>
    </div>

    <div class="title" style="margin-top:10px;">Schedule</div>
    <div style="font-size:12px;">
        OFF 21:00<br>
        ON 05:00
    </div>

    <button class="btn orange" onclick="go('apply_schedule')" style="margin-top:8px;">
        Apply Schedule
    </button>
</div>

<div class="card">
    <div class="title">System</div>

    <div class="grid">
        <button class="btn blue" onclick="go('reboot_router')">Reboot</button>
        <button class="btn red" onclick="go('shutdown_router')">Shutdown</button>
        <button class="btn orange" style="grid-column: span 2;" onclick="go('clear_ram')">Optimize RAM</button>
    </div>
</div>

<script>
function go(c){
    if(!confirm("Execute?")) return;
    var x=new XMLHttpRequest();
    x.open("GET","/cgi-bin/luci/admin/system/"+c,true);
    x.send();
}

function load(){
    var x=new XMLHttpRequest();
    x.onreadystatechange=function(){
        if(x.readyState==4){
            try {
                var d=JSON.parse(x.responseText);

                document.getElementById("uptime").innerHTML=d.uptime;
                document.getElementById("cpu").innerHTML=d.cpu;
                document.getElementById("mem").innerHTML=d.memory_used+"/"+d.memory_total;

                var cpu=parseFloat(d.cpu)||0;
                var mem=(d.memory_used/d.memory_total)*100||0;

                document.getElementById("cpu_bar").style.width=cpu+"%";
                document.getElementById("mem_bar").style.width=mem+"%";

                // 🔥 warna dinamis
                if(cpu > 70){
                    document.getElementById("cpu_bar").style.background="#e74c3c";
                } else {
                    document.getElementById("cpu_bar").style.background="#3daee9";
                }

            } catch(e) {}
        }
    };

    x.open("GET","/cgi-bin/luci/dejede/status",true);
    x.send();

    var t=new XMLHttpRequest();
    t.onreadystatechange=function(){
        if(t.readyState==4){
            try {
                var d=JSON.parse(t.responseText);
                document.getElementById("temp").innerHTML=d.temperature;
            } catch(e) {}
        }
    };

    t.open("GET","/cgi-bin/luci/dejede/temp",true);
    t.send();
}

setInterval(load,4000);
load();
</script>
<div class="footer">
    App by Dejede
</div>
<%+footer%>
