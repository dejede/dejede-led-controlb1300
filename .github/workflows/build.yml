name: Build IPK

on:
push:
branches: [ main ]

jobs:
build:
runs-on: ubuntu-latest

```
steps:
- name: Checkout
  uses: actions/checkout@v3

- name: Install dependencies
  run: |
    sudo apt update
    sudo apt install -y build-essential clang flex bison g++ gawk \
    gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
    python3 unzip zlib1g-dev file wget

- name: Clone OpenWrt SDK
  run: |
    git clone https://github.com/openwrt/openwrt
    cd openwrt

- name: Copy Package
  run: |
    mkdir -p openwrt/package/dejede-control
    cp -r * openwrt/package/dejede-control/

- name: Build Package
  run: |
    cd openwrt
    ./scripts/feeds update -a
    ./scripts/feeds install -a
    make defconfig
    make package/dejede-control/compile V=s

- name: Upload IPK
  uses: actions/upload-artifact@v3
  with:
    name: dejede-ipk
    path: openwrt/bin/packages/**/dejede-control*.ipk
```
